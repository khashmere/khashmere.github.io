<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396" role="img" aria-label="Khashmere">
  <title>Khashmere</title>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&amp;display=swap');
    </style>
    <linearGradient id="li-bg" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#3d4f61"/>
      <stop offset="50%" stop-color="#2a3a4a"/>
      <stop offset="100%" stop-color="#1f2d3a"/>
    </linearGradient>
    <radialGradient id="li-glow">
      <stop offset="0%" stop-color="#d4af82"/>
      <stop offset="100%" stop-color="#d4af82" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#li-bg)"/>

  <!-- Constellation icon (centered-left) -->
  <g transform="translate(640, 198) scale(0.45)">
    <!-- Connecting curves -->
    <path d="M-60 -100 Q0 -10, 60 -50" stroke="#d4af82" stroke-width="2.5" fill="none" opacity="0.4"/>
    <path d="M60 -50 Q110 60, 20 140" stroke="#d4af82" stroke-width="2.5" fill="none" opacity="0.3"/>
    <path d="M-60 -100 Q-100 40, 20 140" stroke="#d4af82" stroke-width="2.5" fill="none" opacity="0.35"/>
    <!-- Central glow -->
    <circle cx="0" cy="0" r="80" fill="url(#li-glow)" opacity="0.4"/>
    <!-- Nodes -->
    <circle cx="-60" cy="-100" r="28" fill="#d4af82"/>
    <circle cx="60" cy="-50" r="20" fill="#d4af82" opacity="0.7"/>
    <circle cx="20" cy="140" r="24" fill="#d4af82" opacity="0.8"/>
  </g>

  <!-- KHASHMERE wordmark -->
  <text x="750" y="210"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="36" font-weight="500" letter-spacing="5" fill="#f0ece8"
  >KHASHMERE</text>

</svg>
